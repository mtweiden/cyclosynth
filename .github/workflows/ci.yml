name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # gmp-mpfr-sys compiles GMP/MPFR/MPC from source; needs m4 + a C toolchain.
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y m4
      - uses: Swatinem/rust-cache@v2
      # Compile every target (lib + bins + tests) so the bins stay
      # cross-platform-buildable even though they're run on macOS.
      - name: Build
        run: cargo build --release --all-targets
      # The telemetry path (probe bins, diag counters) only compiles
      # meaningfully under `trace`; build it so it can't bit-rot.
      - name: Build (trace feature)
        run: cargo build --release --all-targets --features trace
      - name: Test
        run: cargo test --release --lib
      # Several diag-counter tests only do anything under `trace`.
      - name: Test (trace feature)
        run: cargo test --release --lib --features trace

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y m4
      - uses: Swatinem/rust-cache@v2
      # Lint every target (lib + 10 bins + integration tests), default and
      # trace, so warnings can't accrue off the library path.
      - name: Clippy
        run: cargo clippy --release --all-targets -- -D warnings
      - name: Clippy (trace feature)
        run: cargo clippy --release --all-targets --features trace -- -D warnings
